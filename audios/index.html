<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tone.js Blob Player</title>
  <script src="./../lib/Tone.js"></script>
  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      gap: 60px;
    }

    .blob {
      width: 120px;
      height: 120px;
      background: #00ffaa;
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
    }

    .blob:hover {
      transform: scale(1.1);
    }

    .active {
      background: #ff0066;
      transform: scale(1.3);
    }
  </style>
</head>
<body>

<div id="blob1" class="blob"></div>
<div id="blob2" class="blob"></div>

<script>
  let player1, player2;

  async function init() {
    await Tone.start(); // required for browser audio

    player1 = new Tone.Player("./../recursos/afecto-natalia.mp3").toDestination();
    player2 = new Tone.Player("./../recursos/regenerar-natalia.mp3").toDestination();
  }

  function playBlob(player, element) {
    // stop others if you want
    player.start();

    element.classList.add("active");
    setTimeout(() => {
      element.classList.remove("active");
    }, 300);
  }

  document.getElementById("blob1").addEventListener("click", async (e) => {
    if (!player1) await init();
    playBlob(player1, e.target);
  });

  document.getElementById("blob2").addEventListener("click", async (e) => {
    if (!player2) await init();
    playBlob(player2, e.target);
  });
</script>

</body>
</html>
