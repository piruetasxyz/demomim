<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>red regenerativa</title>

  <!--
    ⚠  fetch() requires HTTP — it will not work when opened as a local file (file://).
    For local development, serve this directory over HTTP:

      npx serve .
        or
      python -m http.server

    Then open http://localhost:3000 (or whichever port is shown).
  -->

  <link rel="stylesheet" href="https://use.typekit.net/naa5mvy.css">
  <link rel="stylesheet" href="./../css/red.css">
  <script src="./../lib/js-yaml.min.js"></script>
</head>
<body>

  <div id="error-msg" class="error-msg" role="alert"></div>

  <svg id="main-svg" xmlns="http://www.w3.org/2000/svg" aria-label="Visualización de constelación"></svg>

  <!-- Templates panel — shown/hidden by the Templates button -->
  <div id="templates-panel" class="templates-panel" hidden>
    <span class="templates-panel-label">Visualizaciones</span>
    <div id="templates-grid" class="templates-grid"></div>
  </div>

  <div id="control-bar" class="control-bar" role="toolbar" aria-label="Controles de visualización">

    <div class="control-group">
      <label class="control-label" for="line-weight">Grosor</label>
      <input type="range" id="line-weight" min="0.2" max="3" step="0.1" value="0.8">
    </div>

    <div class="control-group">
      <label class="control-label" for="line-opacity">Opacidad</label>
      <input type="range" id="line-opacity" min="0.05" max="1" step="0.05" value="0.35">
    </div>

    <div class="control-group">
      <label class="control-label" for="font-family">Fuente</label>
      <select id="font-family">
        <option value="'area', sans-serif" selected>Area</option>
        <option value="Inter, sans-serif">Inter</option>
        <option value="Georgia, serif">Georgia</option>
        <option value="Courier New, monospace">Courier New</option>
        <option value="'Times New Roman', serif">Times New Roman</option>
      </select>
    </div>

    <div class="control-group">
      <label class="control-label" for="font-size">Tamaño</label>
      <input type="range" id="font-size" min="10" max="28" step="1" value="14">
    </div>

    <div class="control-group">
      <button id="btn-randomize" type="button">Reorganizar</button>
    </div>

    <div class="control-group">
      <button id="btn-reset" type="button">Reset</button>
    </div>

    <!-- pushed to right via margin-left: auto on its .control-group -->
    <div class="control-group control-group--right">
      <button id="btn-templates" type="button" class="btn-templates">Plantillas ▾</button>
    </div>

  </div>

  <h2>demos</h2>
  <script src="./../js/red.js"></script>
  <script src="./../js/audios.js"></script>

</body>
</html>
